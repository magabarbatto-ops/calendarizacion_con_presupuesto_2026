<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendarización · Gelatina 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161c26;
    --surface2: #1e2736;
    --border: #2a3444;
    --accent: #4a9eff;
    --accent2: #7dd3fc;
    --green: #4ade80;
    --yellow: #fbbf24;
    --red: #f87171;
    --blue-soft: #93c5fd;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 32px 24px 60px;
  }

  header { margin-bottom: 32px; }

  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 800;
    color: #fff;
    line-height: 1.1;
  }

  h1 span { color: var(--accent); }

  .updated {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
  }

  .tab-btn {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    background: none;
    border: none;
    padding: 10px 20px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
    border-radius: 6px 6px 0 0;
  }

  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: rgba(74,158,255,0.05);
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Table */
  .table-wrap {
    overflow-x: auto;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 700px;
  }

  thead tr {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  th {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 13px 16px;
    text-align: left;
    white-space: nowrap;
    font-weight: 500;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  td {
    padding: 13px 16px;
    font-size: 13px;
    vertical-align: middle;
  }

  .project-name {
    font-weight: 700;
    font-size: 14px;
    color: #fff;
  }

  /* Status badges */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    border-radius: 20px;
    padding: 3px 10px;
    white-space: nowrap;
  }
  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .b-aprob        { background: rgba(192,132,252,.1); color: #c084fc; }
  .b-aprob .dot   { background: #c084fc; }
  .b-activo       { background: rgba(74,222,128,.1);  color: #4ade80; }
  .b-activo .dot  { background: #4ade80; }
  .b-postprod     { background: rgba(74,222,128,.1);  color: #86efac; }
  .b-postprod .dot{ background: #86efac; }
  .b-dev          { background: rgba(74,158,255,.1);  color: #93c5fd; }
  .b-dev .dot     { background: #93c5fd; }
  .b-pausa        { background: rgba(251,191,36,.1);  color: #fbbf24; }
  .b-pausa .dot   { background: #fbbf24; }
  .b-cerrado      { background: rgba(100,116,139,.1); color: #94a3b8; }
  .b-cerrado .dot { background: #94a3b8; }

  /* Progress bar */
  .ep-wrap { display: flex; align-items: center; gap: 9px; }
  .ep-bar  { flex: 1; height: 3px; background: var(--border); border-radius: 2px; min-width: 40px; }
  .ep-fill { height: 100%; border-radius: 2px; background: var(--accent); }
  .ep-text { font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: nowrap; }

  /* Dates */
  .date { font-family: var(--mono); font-size: 12px; }
  .date-soon { color: var(--yellow); }
  .date-ok   { color: var(--text); }
  .date-done { color: var(--muted); font-style: italic; }
  .date-none { color: var(--muted); }

  /* Links */
  .link-group { display: flex; gap: 6px; flex-wrap: wrap; }

  .link-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    text-decoration: none;
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 9px;
    border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--muted);
    transition: all 0.13s;
    white-space: nowrap;
  }
  .link-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(74,158,255,.06); }
  .link-btn svg { width: 11px; height: 11px; }
  .link-btn.disabled { opacity: 0.25; pointer-events: none; }

  /* Notes */
  .note {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    max-width: 220px;
    line-height: 1.5;
  }

  /* Section count */
  .section-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 12px;
  }
</style>
</head>

const especiales = [];



function badgeHtml(estado) {
  const map = {
    "Para aprobación":         ["b-aprob",     "Para aprobación"],
    "Activo":                  ["b-activo",   "Activo"],
    "Activo · Post-producción":["b-postprod",  "Activo · Post-prod"],
    "En desarrollo":           ["b-dev",       "En desarrollo"],
    "En pausa":                ["b-pausa",     "En pausa"],
    "Cerrado":                 ["b-cerrado",   "Cerrado"],
  };
  const [cls, label] = map[estado] || ["b-cerrado", estado];
  return `<span class="badge ${cls}"><span class="dot"></span>${label}</span>`;
}

function epHtml(total, grabados) {
  if (!total) return `<span class="date-none" style="font-family:var(--mono);font-size:11px">—</span>`;
  const pct = Math.min(100, Math.round((grabados / total) * 100));
  return `<div class="ep-wrap">
    <div class="ep-bar"><div class="ep-fill" style="width:${pct}%"></div></div>
    <span class="ep-text">${grabados}/${total}</span>
  </div>`;
}

function dateHtml(str) {
  if (!str || str === "—" || str === "?") return `<span class="date date-none">${str || "—"}</span>`;
  if (str.toLowerCase() === "finalizado") return `<span class="date date-done">Finalizado</span>`;
  // Try to parse DD/MM/YYYY
  const m = str.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if (m) {
    const date = new Date(`${m[3]}-${m[2]}-${m[1]}T12:00:00`);
    const today = new Date();
    const diff = (date - today) / (1000 * 60 * 60 * 24);
    const label = date.toLocaleDateString('es-AR', { day: '2-digit', month: 'short', year: 'numeric' });
    const cls = diff >= 0 && diff <= 10 ? 'date-soon' : 'date-ok';
    return `<span class="date ${cls}">${label}</span>`;
  }
  return `<span class="date date-ok">${str}</span>`;
}

function linkHtml(url, label, icon) {
  const hasLink = url && url !== "" && !url.includes("NO TIENE");
  if (hasLink) {
    return `<a href="${url}" target="_blank" class="link-btn">${icon} ${label}</a>`;
  }
  return `<span class="link-btn disabled">${icon} ${label}</span>`;
}

// ── RENDER ───────────────────────────────────────────────────────────────────

function renderOD() {

      <td>${badgeHtml(p.estado)}</td>
      <td>${epHtml(p.total, p.grabados)}</td>
      <td>${dateHtml(p.rodaje)}</td>
      <td>${dateHtml(p.estreno)}</td>
      <td>
        <div class="link-group">
          ${linkHtml(p.presupuesto, 'Presupuesto', icoDoc)}
          ${linkHtml(p.carpeta, 'Carpeta', icoFolder)}
          ${p.carpetaAbierta ? linkHtml(p.carpetaAbierta, 'Carpeta abierta', icoFolder) : ''}
        </div>
      </td>
      <td><span class="note">${p.notas || '—'}</span></td>
    </tr>
  `).join('');
}

function renderPresenciales() {

      <td>${dateHtml(p.fecha)}</td>
      <td>
        <div class="link-group">

        </div>
      </td>
      <td><span class="note">${p.notas || '—'}</span></td>
    </tr>

}

function renderEspeciales() {

}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}
